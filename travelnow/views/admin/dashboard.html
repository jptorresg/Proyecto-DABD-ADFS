<!DOCTYPE html>
<html>
<head><title>Dashboard Admin</title>
<link rel="stylesheet" href="/public/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
    <nav class="admin-sidebar">
        <div class="sidebar-logo">Travel<span>Now</span></div>
        <a href="/admin/dashboard" class="sidebar-nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/usuarios" class="sidebar-nav-item"><i class="fas fa-users"></i> Usuarios</a>
        <a href="/admin/reservaciones" class="sidebar-nav-item"><i class="fas fa-plane"></i> Reservaciones</a>
        <a href="/admin/proveedores" class="sidebar-nav-item"><i class="fas fa-building"></i> Proveedores</a>
    </nav>
    <div class="admin-main">
        <header class="admin-topbar">
            <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
            <div><a href="/auth/logout" class="btn-sm-gold">Logout</a></div>
        </header>
        <main class="admin-content">
            <h2>¡Bienvenido Admin!</h2>
            <p>Panel de administración funcionando correctamente.</p>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin-top:2rem;">
                <div class="admin-stat-card">
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <div class="admin-stat-icon"><i class="fas fa-users"></i></div>
                        <div>
                            <div class="admin-stat-num" id="total-usuarios">0</div>
                            <div class="admin-stat-lbl">Usuarios</div>
                        </div>
                    </div>
                </div>
                <div class="admin-stat-card">
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <div class="admin-stat-icon"><i class="fas fa-plane"></i></div>
                        <div>
                            <div class="admin-stat-num" id="total-reservas">0</div>
                            <div class="admin-stat-lbl">Reservaciones</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
