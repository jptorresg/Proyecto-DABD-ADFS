<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario - Bedly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --primary-color: #003580; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; }
        .navbar-bedly { background-color: var(--primary-color); padding: 0.75rem 0; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: #fff; text-decoration: none; }
        .brand span { color: #f5a623; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 24px rgba(0,53,128,0.10); }
        .page-header { background-color: var(--primary-color); color: white; padding: 2rem 0; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
        .form-control, .form-select { border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: 'DM Sans', sans-serif; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0,53,128,0.1); }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
        .btn-primary { background-color: var(--primary-color); border: none; border-radius: 10px; font-weight: 600; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.88; background-color: var(--primary-color); }
        .table th { font-size: 0.78rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #e5e7eb; }
        .modal-content { border: none; border-radius: 15px; }
        .modal-header { background-color: var(--primary-color); color: white; border-radius: 15px 15px 0 0; }
        .btn-close-white { filter: invert(1); }
        .field-required { color: #dc2626; margin-left: 2px; }
    </style>
</head>
<body x-data="inventarioApp()" x-init="init()">

    <nav class="navbar-bedly">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand" href="index.html">Bed<span>ly</span></a>
            <a href="admin.html" class="btn btn-outline-light btn-sm rounded-pill">
                <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
        </div>
    </nav>

    <div class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title mb-1">Gestión de Inventario</h1>
                <p style="opacity:0.8; font-size:0.9rem;" x-text="habitaciones.length + ' habitaciones registradas'"></p>
            </div>
            <button class="btn btn-warning fw-bold rounded-pill px-4" @click="abrirModal(null)">
                <i class="bi bi-plus-circle me-2"></i>Nueva Habitación
            </button>
        </div>
    </div>

    <main class="container my-4">

        <div x-show="exito" class="alert alert-success alert-dismissible mb-3" x-text="exito">
            <button type="button" class="btn-close" @click="exito = ''"></button>
        </div>
        <div x-show="error" class="alert alert-danger alert-dismissible mb-3" x-text="error">
            <button type="button" class="btn-close" @click="error = ''"></button>
        </div>

        <div class="card mb-4 p-3">
            <div class="row g-2 align-items-center">
                <div class="col-md-4">
                    <input type="text" class="form-control" x-model="filtro"
                           placeholder="Buscar por tipo, número...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" x-model="filtroEstado">
                        <option value="">Todos los estados</option>
                        <option value="Disponible">Disponible</option>
                        <option value="Ocupada">Ocupada</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Inactiva">Inactiva</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" x-model="filtroHotel">
                        <option value="">Todos los hoteles</option>
                        <template x-for="h in hoteles" :key="h.idHotel">
                            <option :value="h.idHotel" x-text="h.nombreHotel"></option>
                        </template>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100"
                            @click="filtro = ''; filtroEstado = ''; filtroHotel = ''">
                        <i class="bi bi-x-lg me-1"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>

        <div x-show="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando inventario...</p>
        </div>

        <div class="card" x-show="!loading">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Número</th>
                                <th>Tipo</th>
                                <th>Hotel</th>
                                <th>Ciudad</th>
                                <th>Precio/Noche</th>
                                <th>Capacidad</th>
                                <th>Estado</th>
                                <th class="text-center pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="h in habitacionesFiltradas" :key="h.idHabitacion">
                                <tr>
                                    <td class="ps-4 text-muted small" x-text="h.idHabitacion"></td>
                                    <td class="fw-bold" x-text="h.numHabitacion"></td>
                                    <td x-text="h.tipoHabitacion"></td>
                                    <td class="text-muted small" x-text="h.nombreHotel"></td>
                                    <td class="text-muted small">
                                        <i class="bi bi-geo-alt me-1"></i>
                                        <span x-text="h.ubicacion || '-'"></span>
                                    </td>
                                    <td class="fw-bold text-success" x-text="'Q ' + parseFloat(h.precioNoche).toFixed(2)"></td>
                                    <td x-text="h.capacidadMax + ' pers.'"></td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              :class="{
                                                'bg-success': h.estado === 'Disponible',
                                                'bg-danger':  h.estado === 'Ocupada',
                                                'bg-warning text-dark': h.estado === 'Mantenimiento',
                                                'bg-secondary': h.estado === 'Inactiva'
                                              }"
                                              x-text="h.estado"></span>
                                    </td>
                                    <td class="text-center pe-4">
                                        <div class="d-flex gap-1 justify-content-center">
                                            <button class="btn btn-sm btn-outline-primary rounded-pill px-3"
                                                    @click="abrirModal(h)">
                                                <i class="bi bi-pencil me-1"></i>Editar
                                            </button>
                                            <button class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                    @click="eliminar(h.idHabitacion)">
                                                <i class="bi bi-trash me-1"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="habitacionesFiltradas.length === 0">
                                <td colspan="9" class="text-center text-muted py-4">No se encontraron habitaciones.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="modalHabitacion" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" x-text="modoEdicion ? 'Editar Habitación' : 'Nueva Habitación'"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Número de Habitación <span class="field-required">*</span></label>
                            <input type="text" class="form-control" x-model="form.numHabitacion"
                                   placeholder="Ej: 101">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tipo de Habitación <span class="field-required">*</span></label>
                            <select class="form-select" x-model="form.tipoHabitacion">
                                <option value="">Seleccionar...</option>
                                <option value="Sencilla">Sencilla</option>
                                <option value="Doble">Doble</option>
                                <option value="Suite">Suite</option>
                                <option value="Familiar">Familiar</option>
                                <option value="Ejecutiva">Ejecutiva</option>
                                <option value="Penthouse">Penthouse</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Precio por Noche (Q) <span class="field-required">*</span></label>
                            <input type="number" class="form-control" x-model="form.precioNoche"
                                   placeholder="Ej: 850.00" min="0" step="0.01">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Capacidad Máxima <span class="field-required">*</span></label>
                            <select class="form-select" x-model="form.capacidadMax">
                                <option value="1">1 persona</option>
                                <option value="2">2 personas</option>
                                <option value="3">3 personas</option>
                                <option value="4">4 personas</option>
                                <option value="6">6 personas</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cadena Hotelera <span class="field-required">*</span></label>
                            <select class="form-select" x-model="form.idHotel">
                                <option value="">Seleccionar hotel...</option>
                                <template x-for="h in hoteles" :key="h.idHotel">
                                    <option :value="h.idHotel"
                                            x-text="h.nombreHotel + ' (' + h.estrellas + '★)'">
                                    </option>
                                </template>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Ciudad <span class="field-required">*</span></label>
                            <input type="text" class="form-control" x-model="form.ciudad"
                                   placeholder="Ej: Guatemala City, Antigua..."
                                   list="lista-ciudades">
                            <datalist id="lista-ciudades">
                                <template x-for="c in ciudadesExistentes" :key="c">
                                    <option :value="c"></option>
                                </template>
                            </datalist>
                            <div class="form-text text-muted" style="font-size:0.75rem;">
                                <i class="bi bi-info-circle me-1"></i>
                                Esta ciudad aparecerá en los filtros del catálogo.
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select class="form-select" x-model="form.estado">
                                <option value="Disponible">Disponible</option>
                                <option value="Ocupada">Ocupada</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Inactiva">Inactiva</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estrellas del Hotel</label>
                            <select class="form-select" x-model="form.estrellas">
                                <option value="1">⭐ 1 estrella</option>
                                <option value="2">⭐⭐ 2 estrellas</option>
                                <option value="3">⭐⭐⭐ 3 estrellas</option>
                                <option value="4">⭐⭐⭐⭐ 4 estrellas</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 estrellas</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Amenidades (separadas por coma)</label>
                            <input type="text" class="form-control" x-model="form.amenidades"
                                   placeholder="Ej: WiFi, A/C, TV, Desayuno">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" x-model="form.descripcion" rows="3"
                                      placeholder="Descripción de la habitación..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">URL de Imagen</label>
                            <input type="text" class="form-control" x-model="form.imagenUrl"
                                   placeholder="https://...">
                        </div>
                    </div>
                    <div x-show="errorModal" class="alert alert-danger mt-3 small" x-text="errorModal"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4"
                            data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4"
                            @click="guardar()" :disabled="cargando">
                        <span x-show="!cargando"><i class="bi bi-check-circle me-2"></i>Guardar</span>
                        <span x-show="cargando">
                            <span class="spinner-border spinner-border-sm me-2"></span>Guardando...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const API = 'http://localhost:5043/api';

    function inventarioApp() {
        return {
            habitaciones: [],
            hoteles: [],
            ciudadesExistentes: [],
            loading: true,
            cargando: false,
            error: '',
            exito: '',
            errorModal: '',
            filtro: '',
            filtroEstado: '',
            filtroHotel: '',
            modoEdicion: false,
            form: {
                idHabitacion: null,
                numHabitacion: '',
                tipoHabitacion: '',
                precioNoche: '',
                capacidadMax: 2,
                estado: 'Disponible',
                idHotel: '',
                ciudad: '',
                estrellas: 5,
                amenidades: '',
                descripcion: '',
                imagenUrl: ''
            },

            async init() {
                await Promise.all([
                    this.cargarHabitaciones(),
                    this.cargarHoteles(),
                    this.cargarCiudades()
                ]);
            },

            async cargarHabitaciones() {
                this.loading = true;
                try {
                    const res  = await fetch(`${API}/inventario`);
                    const data = await res.json();
                    if (data.success) this.habitaciones = data.data;
                } catch (e) {
                    this.error = 'Error al cargar habitaciones.';
                } finally {
                    this.loading = false;
                }
            },

            async cargarHoteles() {
                try {
                    const res  = await fetch(`${API}/admin/hoteles`);
                    const data = await res.json();
                    if (data.success) this.hoteles = data.data;
                } catch (e) {}
            },

            async cargarCiudades() {
                try {
                    const res  = await fetch(`${API}/habitaciones/opciones-filtro`);
                    const data = await res.json();
                    if (data.success) this.ciudadesExistentes = data.data.ciudades || [];
                } catch (e) {}
            },

            abrirModal(hab) {
                this.errorModal = '';
                if (hab) {
                    this.modoEdicion = true;
                    this.form = {
                        idHabitacion:  hab.idHabitacion,
                        numHabitacion: hab.numHabitacion,
                        tipoHabitacion: hab.tipoHabitacion,
                        precioNoche:   hab.precioNoche,
                        capacidadMax:  hab.capacidadMax,
                        estado:        hab.estado,
                        idHotel:       hab.idHotel || '',
                        ciudad:        hab.ubicacion || '',
                        estrellas:     hab.estrellas || 5,
                        amenidades:    hab.amenidades || '',
                        descripcion:   hab.descripcion || '',
                        imagenUrl:     hab.imagenUrl || ''
                    };
                } else {
                    this.modoEdicion = false;
                    this.form = {
                        idHabitacion:  null,
                        numHabitacion: '',
                        tipoHabitacion: '',
                        precioNoche:   '',
                        capacidadMax:  2,
                        estado:        'Disponible',
                        idHotel:       this.hoteles.length > 0 ? this.hoteles[0].idHotel : '',
                        ciudad:        '',
                        estrellas:     5,
                        amenidades:    '',
                        descripcion:   '',
                        imagenUrl:     ''
                    };
                }
                const modal = new bootstrap.Modal(document.getElementById('modalHabitacion'));
                modal.show();
            },

            async guardar() {
                this.errorModal = '';
                if (!this.form.numHabitacion)  { this.errorModal = 'El número de habitación es requerido.'; return; }
                if (!this.form.tipoHabitacion) { this.errorModal = 'El tipo de habitación es requerido.'; return; }
                if (!this.form.precioNoche)    { this.errorModal = 'El precio es requerido.'; return; }
                if (!this.form.idHotel)        { this.errorModal = 'Selecciona una cadena hotelera.'; return; }
                if (!this.form.ciudad.trim())  { this.errorModal = 'La ciudad es obligatoria.'; return; }

                const payload = {
                    idHotel:        parseInt(this.form.idHotel),
                    numHabitacion:  this.form.numHabitacion,
                    tipoHabitacion: this.form.tipoHabitacion,
                    precioNoche:    parseFloat(this.form.precioNoche),
                    capacidadMax:   parseInt(this.form.capacidadMax),
                    estado:         this.form.estado,
                    ciudad:         this.form.ciudad.trim(),
                    estrellas:      parseInt(this.form.estrellas),
                    amenidades:     this.form.amenidades || null,
                    descripcion:    this.form.descripcion || null,
                    imagenUrl:      this.form.imagenUrl || null
                };

                this.cargando = true;
                try {
                    let res, data;
                    if (this.modoEdicion) {
                        res = await fetch(`${API}/inventario/${this.form.idHabitacion}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        res = await fetch(`${API}/inventario`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }
                    data = await res.json();
                    if (data.success) {
                        this.exito = this.modoEdicion
                            ? 'Habitación actualizada exitosamente.'
                            : 'Habitación creada exitosamente.';
                        bootstrap.Modal.getInstance(
                            document.getElementById('modalHabitacion')
                        ).hide();
                        await Promise.all([
                            this.cargarHabitaciones(),
                            this.cargarCiudades()
                        ]);
                        setTimeout(() => this.exito = '', 3000);
                    } else {
                        this.errorModal = data.message;
                    }
                } catch (e) {
                    this.errorModal = 'Error al conectar con el servidor.';
                } finally {
                    this.cargando = false;
                }
            },

            async eliminar(id) {
                if (!confirm('¿Estás seguro de eliminar esta habitación?')) return;
                try {
                    const res  = await fetch(`${API}/inventario/${id}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        this.exito = 'Habitación eliminada correctamente.';
                        await this.cargarHabitaciones();
                        setTimeout(() => this.exito = '', 3000);
                    } else {
                        this.error = data.message;
                    }
                } catch (e) {
                    this.error = 'Error al eliminar.';
                }
            },

            get habitacionesFiltradas() {
                return this.habitaciones.filter(h => {
                    const matchFiltro  = !this.filtro ||
                        h.tipoHabitacion.toLowerCase().includes(this.filtro.toLowerCase()) ||
                        h.numHabitacion.toLowerCase().includes(this.filtro.toLowerCase());
                    const matchEstado  = !this.filtroEstado || h.estado === this.filtroEstado;
                    const matchHotel   = !this.filtroHotel  || h.idHotel === parseInt(this.filtroHotel);
                    return matchFiltro && matchEstado && matchHotel;
                });
            }
        }
    }
    </script>
</body>
</html>
