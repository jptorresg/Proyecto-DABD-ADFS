<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Hoteles - Bedly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .hero-section { background: linear-gradient(135deg, #1e3a5f, #2d6a9f); color: white; padding: 80px 0; }
        .card { transition: transform 0.2s, box-shadow 0.2s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .badge-amenidad { background: #e8f4fd; color: #1e6fa5; font-size: 0.75rem; padding: 4px 8px; border-radius: 20px; }
    </style>
</head>
<body x-data="appHabitaciones()" x-init="init()">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Bedly</a>
            <div class="navbar-nav ms-auto d-flex align-items-center gap-3">
                <a class="nav-link active" href="#">Catálogo</a>
                <a class="nav-link" href="historial.html">Mis Reservas</a>
                <a class="nav-link text-warning fw-bold" href="admin.html"
                   x-show="usuario && usuario.rol === 'admin'">
                    <i class="bi bi-speedometer2 me-1"></i>Dashboard
                </a>
                <span class="text-white-50 small" x-text="usuario ? '👤 ' + usuario.nombre : ''"></span>
                <a class="nav-link text-danger" href="login.html" @click="localStorage.removeItem('usuario')">Salir</a>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Encuentra tu próximo destino</h1>
            <p class="lead">Gestión de inventario en tiempo real para Agencias y Huéspedes.</p>
        </div>
    </header>

    <main class="container my-5">

        <!-- Búsqueda y filtros -->
        <div class="row mb-4">
            <div class="col-md-5 mb-2">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" x-model="filtros.tipo" @input="filtrar()"
                           class="form-control" placeholder="¿Qué tipo de habitación buscas? (Ej: Suite, Doble...)">
                </div>
            </div>
            <div class="col-md-3 mb-2">
                <select x-model="filtros.capacidad" @change="filtrar()" class="form-select shadow-sm">
                    <option value="">Cualquier capacidad</option>
                    <option value="1">1 persona</option>
                    <option value="2">2 personas</option>
                    <option value="3">3 personas</option>
                    <option value="4">4+ personas</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <select x-model="filtros.precioMax" @change="filtrar()" class="form-select shadow-sm">
                    <option value="">Cualquier precio</option>
                    <option value="500">Hasta Q500</option>
                    <option value="800">Hasta Q800</option>
                    <option value="1200">Hasta Q1,200</option>
                    <option value="2000">Hasta Q2,000</option>
                </select>
            </div>
            <div class="col-md-1 mb-2">
                <button @click="limpiarFiltros()" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div x-show="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando habitaciones...</p>
        </div>

        <!-- Error -->
        <div x-show="error" class="alert alert-danger" x-text="error"></div>

        <!-- Sin resultados -->
        <div x-show="!loading && !error && habitaciones.length === 0" class="text-center py-5">
            <i class="bi bi-building-slash fs-1 text-muted"></i>
            <p class="mt-2 text-muted">No se encontraron habitaciones disponibles.</p>
        </div>

        <!-- Tarjetas -->
        <div class="row">
            <template x-for="h in habitaciones" :key="h.idHabitacion">
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title fw-bold mb-0" x-text="h.tipoHabitacion + ' ' + h.numHabitacion"></h5>
                                <span class="badge bg-success" x-text="h.estado"></span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-building me-1"></i>
                                <span x-text="h.nombreHotel"></span>
                            </p>
                            <p class="text-muted small mb-2">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span x-text="h.ubicacion"></span>
                                <span x-text="' · ⭐'.repeat(h.estrellas)"></span>
                            </p>
                            <p class="text-muted small mb-3">
                                <i class="bi bi-people me-1"></i> Capacidad: <strong x-text="h.capacidadMax + ' personas'"></strong>
                            </p>
                            <!-- Amenidades -->
                            <div class="d-flex flex-wrap gap-1 mb-3">
                                <template x-for="amenidad in (h.amenidades ? h.amenidades.split(',') : [])" :key="amenidad">
                                    <span class="badge-amenidad" x-text="amenidad.trim()"></span>
                                </template>
                            </div>
                            <hr class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="h4 mb-0 text-primary fw-bold" x-text="'Q' + h.precioNoche.toFixed(2)"></span>
                                    <span class="text-muted small"> / noche</span>
                                </div>
                                <a :href="'detalle_habitacion.html?id=' + h.idHabitacion" 
                                   class="btn btn-primary px-4 rounded-pill">Ver detalle</a>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <footer class="bg-light py-4 mt-5 border-top">
        <div class="container text-center">
            <p class="text-muted mb-0">© 2024 Equipo Técnico - Módulo de Hoteles [C# / SQL Server]</p>
        </div>
    </footer>

    <script>
        const API = 'http://localhost:5043/api';

        function appHabitaciones() {
            return {
                habitaciones: [],
                loading: false,
                error: '',
                usuario: null,
                filtros: { tipo: '', capacidad: '', precioMax: '' },

                async init() {
                    this.usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
                    await this.cargarHabitaciones();
                },

                async cargarHabitaciones() {
                    this.loading = true;
                    this.error = '';
                    try {
                        const res = await fetch(`${API}/habitaciones`);
                        const data = await res.json();
                        if (data.success) {
                            this.habitaciones = data.data;
                        } else {
                            this.error = data.message;
                        }
                    } catch (e) {
                        this.error = 'Error al conectar con el servidor';
                    } finally {
                        this.loading = false;
                    }
                },

                async filtrar() {
                    this.loading = true;
                    this.error = '';
                    try {
                        let url = `${API}/habitaciones/filtrar?`;
                        if (this.filtros.tipo) url += `tipo=${this.filtros.tipo}&`;
                        if (this.filtros.capacidad) url += `capacidad=${this.filtros.capacidad}&`;
                        if (this.filtros.precioMax) url += `precioMax=${this.filtros.precioMax}&`;

                        const res = await fetch(url);
                        const data = await res.json();
                        if (data.success) {
                            this.habitaciones = data.data;
                        }
                    } catch (e) {
                        this.error = 'Error al filtrar';
                    } finally {
                        this.loading = false;
                    }
                },

                limpiarFiltros() {
                    this.filtros = { tipo: '', capacidad: '', precioMax: '' };
                    this.cargarHabitaciones();
                }
            }
        }
    </script>
</body>
</html>
