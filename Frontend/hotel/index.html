<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Hoteles - Bedly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --primary-color: #003580; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; }
        .navbar-bedly { background-color: var(--primary-color); padding: 0.75rem 0; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: #fff; text-decoration: none; }
        .brand span { color: #f5a623; }
        .hero { background: linear-gradient(135deg, #003580, #0055b3); color: white; padding: 70px 0 50px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; }
        .search-box { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.15); margin-top: -40px; position: relative; z-index: 10; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 24px rgba(0,53,128,0.08); transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(0,53,128,0.15); }
        .badge-amenidad { background: #e8f4fd; color: #1e6fa5; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--primary-color); }
        .form-control, .form-select { border: 1.5px solid #e5e7eb; border-radius: 10px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0,53,128,0.1); }
        .city-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; margin-top: 2rem; }
        .city-header h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--primary-color); margin: 0; }
        .city-header .city-line { flex: 1; height: 2px; background: linear-gradient(to right, #003580, transparent); }
        .city-header .city-count { font-size: 0.8rem; color: #9ca3af; background: #f0f4f8; border: 1px solid #e5e7eb; border-radius: 20px; padding: 2px 10px; }
        .room-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px 12px 0 0; }
        .card-body { padding: 1.2rem !important; }
    </style>
</head>
<body x-data="appHabitaciones()" x-init="init()">

    <nav class="navbar-bedly">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand" href="index.html">Bed<span>ly</span></a>
            <div class="d-flex align-items-center gap-3">
                <a href="historial.html" class="btn btn-outline-light btn-sm rounded-pill">
                    <i class="bi bi-calendar-check me-1"></i>Mis Reservas
                </a>
                <a href="admin.html" class="btn btn-warning btn-sm rounded-pill fw-bold"
                   x-show="usuario && (usuario.rol === 'admin' || usuario.rol === 'superadmin' || usuario.rol === 'recepcionista' || usuario.rol === 'auditor')">
                    <i class="bi bi-speedometer2 me-1"></i>Dashboard
                </a>
                <span class="text-white-50 small" x-text="usuario ? '👤 ' + usuario.nombre : ''"></span>
                <a href="landing.html" class="btn btn-outline-light btn-sm rounded-pill"
                   @click="localStorage.removeItem('usuario')">
                    <i class="bi bi-box-arrow-left me-1"></i>Salir
                </a>
            </div>
        </div>
    </nav>

    <div class="hero text-center">
        <div class="container">
            <h1>Bienvenido, <span x-text="usuario ? usuario.nombre.split(' ')[0] : ''"></span></h1>
            <p class="lead mb-0" style="opacity:0.85;">Explora y reserva la habitación perfecta para ti.</p>
        </div>
    </div>

    <main class="container my-5">

        <!-- Filtros -->
        <div class="search-box mb-5">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted text-uppercase">Tipo de habitación</label>
                    <select class="form-select" x-model="filtros.tipo" @change="filtrar()">
                        <option value="">Todos los tipos</option>
                        <template x-for="tipo in opcionesFiltro.tipos" :key="tipo">
                            <option :value="tipo" x-text="tipo"></option>
                        </template>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold small text-muted text-uppercase">Capacidad</label>
                    <select class="form-select" x-model="filtros.capacidad" @change="filtrar()">
                        <option value="">Cualquiera</option>
                        <option value="1">1 persona</option>
                        <option value="2">2 personas</option>
                        <option value="3">3 personas</option>
                        <option value="4">4+ personas</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted text-uppercase">Precio máximo</label>
                    <select class="form-select" x-model="filtros.precioMax" @change="filtrar()">
                        <option value="">Cualquier precio</option>
                        <option value="500">Hasta Q500</option>
                        <option value="800">Hasta Q800</option>
                        <option value="1200">Hasta Q1,200</option>
                        <option value="2000">Hasta Q2,000</option>
                        <option value="5000">Hasta Q5,000</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted text-uppercase">Ciudad</label>
                    <select class="form-select" x-model="filtros.ciudad" @change="filtrar()">
                        <option value="">Todas las ciudades</option>
                        <template x-for="ciudad in opcionesFiltro.ciudades" :key="ciudad">
                            <option :value="ciudad" x-text="ciudad"></option>
                        </template>
                    </select>
                </div>
                <div class="col-md-1">
                    <button @click="limpiarFiltros()" class="btn btn-outline-secondary w-100 rounded-pill"
                            title="Limpiar filtros">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div x-show="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando habitaciones...</p>
        </div>

        <!-- Sin resultados -->
        <div x-show="!loading && habitaciones.length === 0" class="text-center py-5">
            <i class="bi bi-building-slash" style="font-size:3rem; color:#9ca3af;"></i>
            <p class="mt-2 text-muted fw-bold">No se encontraron habitaciones disponibles.</p>
        </div>

        <!-- Encabezado general -->
        <div class="d-flex justify-content-between align-items-center mb-2" x-show="!loading && habitaciones.length > 0">
            <h2 class="section-title mb-0">
                Habitaciones Disponibles
                <span x-show="filtros.ciudad" class="fs-6 fw-normal text-muted ms-2"
                      x-text="'en ' + filtros.ciudad"></span>
            </h2>
            <span class="text-muted small" x-text="habitaciones.length + ' habitaciones encontradas'"></span>
        </div>

        <!-- Habitaciones agrupadas por ciudad -->
        <template x-for="grupo in habitacionesPorCiudad" :key="grupo.ciudad">
            <div>
                <!-- Header de ciudad -->
                <div class="city-header">
                    <i class="bi bi-geo-alt-fill" style="color:var(--primary-color); font-size:1.1rem;"></i>
                    <h3 x-text="grupo.ciudad"></h3>
                    <div class="city-line"></div>
                    <span class="city-count" x-text="grupo.habitaciones.length + ' disponibles'"></span>
                </div>

                <!-- Tarjetas de habitaciones -->
                <div class="row g-4 mb-2">
                    <template x-for="h in grupo.habitaciones" :key="h.idHabitacion">
                        <div class="col-md-6 col-lg-4">
                            <div class="card h-100">
                                <!-- Imagen por tipo -->
                                <img :src="imagenPorTipo(h.tipoHabitacion)"
                                     :alt="h.tipoHabitacion"
                                     class="room-img">
                                <div class="card-body d-flex flex-column">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="fw-bold mb-0" style="color:var(--primary-color); font-size:1rem;"
                                            x-text="h.tipoHabitacion + ' ' + h.numHabitacion"></h5>
                                        <span class="badge bg-success rounded-pill" x-text="h.estado"></span>
                                    </div>
                                    <p class="text-muted small mb-1">
                                        <i class="bi bi-building me-1"></i>
                                        <span x-text="h.nombreHotel"></span>
                                    </p>
                                    <p class="text-muted small mb-3">
                                        <i class="bi bi-people me-1"></i>
                                        Capacidad: <strong x-text="h.capacidadMax + ' personas'"></strong>
                                        <span x-text="' · ' + '⭐'.repeat(h.estrellas)"></span>
                                    </p>
                                    <div class="d-flex flex-wrap gap-1 mb-3">
                                        <template x-for="amenidad in (h.amenidades ? h.amenidades.split(',').slice(0,3) : [])" :key="amenidad">
                                            <span class="badge-amenidad" x-text="amenidad.trim()"></span>
                                        </template>
                                    </div>
                                    <hr class="mt-auto">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <span class="h5 mb-0 fw-bold" style="color:var(--primary-color);"
                                                  x-text="'Q' + h.precioNoche.toFixed(2)"></span>
                                            <span class="text-muted small"> / noche</span>
                                        </div>
                                        <a :href="'detalle_habitacion.html?id=' + h.idHabitacion"
                                           class="btn btn-primary btn-sm rounded-pill px-3"
                                           style="background:var(--primary-color); border:none;">
                                            Ver detalle
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <footer class="bg-white py-4 mt-5 border-top">
        <div class="container text-center">
            <p class="text-muted mb-0" style="font-size:0.85rem;">
                © 2026 Bedly — Sistema de Gestión Hotelera · UNIS
            </p>
        </div>
    </footer>

    <script>
    const API = 'http://localhost:5043/api';

    const IMAGENES_TIPO = {
        'Sencilla':   'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600&h=400&fit=crop',
        'Doble':      'https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=600&h=400&fit=crop',
        'Suite':      'https://images.unsplash.com/photo-1590490360182-c33d57733427?w=600&h=400&fit=crop',
        'Familiar':   'https://images.unsplash.com/photo-1586105251261-72a756497a11?w=600&h=400&fit=crop',
        'Ejecutiva':  'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=600&h=400&fit=crop',
        'Penthouse':  'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&h=400&fit=crop',
    };

    function appHabitaciones() {
        return {
            habitaciones: [],
            opcionesFiltro: { tipos: [], ciudades: [] },
            loading: false,
            usuario: null,
            filtros: { tipo: '', capacidad: '', precioMax: '', ciudad: '' },

            async init() {
    this.usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
    if (!this.usuario) { window.location.href = 'landing.html'; return; }
    await Promise.all([this.cargarHabitaciones(), this.cargarOpciones()]);
},
            async cargarHabitaciones() {
                this.loading = true;
                try {
                    const res  = await fetch(`${API}/habitaciones`);
                    const data = await res.json();
                    if (data.success) this.habitaciones = data.data;
                } catch (e) {} finally { this.loading = false; }
            },

            async cargarOpciones() {
                try {
                    const res  = await fetch(`${API}/habitaciones/opciones-filtro`);
                    const data = await res.json();
                    if (data.success) this.opcionesFiltro = data.data;
                } catch (e) {}
            },

            async filtrar() {
                this.loading = true;
                try {
                    let url = `${API}/habitaciones/filtrar?`;
                    if (this.filtros.tipo)      url += `tipo=${encodeURIComponent(this.filtros.tipo)}&`;
                    if (this.filtros.capacidad) url += `capacidad=${this.filtros.capacidad}&`;
                    if (this.filtros.precioMax) url += `precioMax=${this.filtros.precioMax}&`;
                    const res  = await fetch(url);
                    const data = await res.json();
                    if (data.success) {
                        let resultado = data.data;
                        if (this.filtros.ciudad) {
                            resultado = resultado.filter(h =>
                                h.ubicacion && h.ubicacion.toLowerCase()
                                    .includes(this.filtros.ciudad.toLowerCase())
                            );
                        }
                        this.habitaciones = resultado;
                    }
                } catch (e) {} finally { this.loading = false; }
            },

            limpiarFiltros() {
                this.filtros = { tipo: '', capacidad: '', precioMax: '', ciudad: '' };
                this.cargarHabitaciones();
            },

            imagenPorTipo(tipo) {
                return IMAGENES_TIPO[tipo] || 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600&h=400&fit=crop';
            },

            get habitacionesPorCiudad() {
                const grupos = {};
                for (const h of this.habitaciones) {
                    const ciudad = h.ubicacion || 'Sin ciudad';
                    if (!grupos[ciudad]) grupos[ciudad] = [];
                    grupos[ciudad].push(h);
                }
                return Object.keys(grupos).sort().map(ciudad => ({
                    ciudad,
                    habitaciones: grupos[ciudad]
                }));
            }
        }
    }
    </script>
</body>
</html>
