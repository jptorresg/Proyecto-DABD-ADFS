<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedly | Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-teal-500 min-h-screen flex items-center justify-center p-4">

    <div x-data="{
            loading: false,
            email: '',
            password: '',
            recordarme: false,
            verPassword: false,
            error: '',
            init() {
                const emailGuardado = localStorage.getItem('bedly_email');
                if (emailGuardado) {
                    this.email = emailGuardado;
                    this.recordarme = true;
                }
            },
            async login() {
                this.loading = true;
                this.error = '';
                try {
                    const response = await fetch('http://localhost:5043/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.email, password: this.password })
                    });
                    const data = await response.json();
                    if (data.success) {
                        localStorage.setItem('usuario', JSON.stringify(data.data));
                        if (this.recordarme) {
                            localStorage.setItem('bedly_email', this.email);
                        } else {
                            localStorage.removeItem('bedly_email');
                        }
                        window.location.href = 'index.html';
                    } else {
                        this.error = data.message;
                    }
                } catch (e) {
                    this.error = 'Error al conectar con el servidor';
                } finally {
                    this.loading = false;
                }
            }
         }" 
         x-init="init()"
         class="glass w-full max-auto max-w-md p-8 rounded-2xl shadow-2xl border border-white/20">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4 shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Bedly</h1>
            <p class="text-gray-500 text-sm mt-2">Módulo de Gestión Hotelera B2B</p>
        </div>

        <!-- Error -->
        <div x-show="error" x-text="error"
             class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">
        </div>

        <button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-2.5 rounded-lg text-gray-700 font-semibold hover:bg-gray-50 transition-all active:scale-[0.98] mb-6">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5 h-5" alt="Google">
            Continuar con Google
        </button>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-300"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-500">O usa tu cuenta</span></div>
        </div>

        <form @submit.prevent="login()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" x-model="email" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                           placeholder="admin@hotel.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <div class="relative">
                        <input :type="verPassword ? 'text' : 'password'" 
                               x-model="password" required
                               class="w-full px-4 py-2 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                               placeholder="••••••••">
                        <button type="button"
                                @click="verPassword = !verPassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                            <!-- Ojo abierto -->
                            <svg x-show="!verPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <!-- Ojo cerrado -->
                            <svg x-show="verPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between mt-4 mb-6">
                <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer select-none">
                    <input type="checkbox" x-model="recordarme"
                           class="w-4 h-4 rounded border-gray-300 text-blue-600 cursor-pointer">
                    <span>Recordarme</span>
                    <span x-show="recordarme" class="text-blue-500 font-medium">(email guardado)</span>
                </label>
                <a href="#" class="text-xs text-blue-600 hover:underline">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-200"
                    :class="loading ? 'opacity-70 cursor-not-allowed' : ''"
                    :disabled="loading">
                <template x-if="loading">
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </template>
                <span x-text="loading ? 'Validando...' : 'Iniciar Sesión'"></span>
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            ¿No tienes una cuenta? <a href="registro.html" class="text-blue-600 font-semibold hover:underline">Regístrate</a>
        </p>
    </div>

</body>
</html>
