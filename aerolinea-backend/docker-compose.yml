services:

  # ============================================================
  # BASE DE DATOS - INSTANCIA 1
  # ============================================================
  oracle-db-1:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_db_1
    ports:
      - "1522:1521"        # Puerto externo para conectarte con DBeaver
    environment:
      - ORACLE_PASSWORD=oracle
      # NO se usa APP_USER aquí: el usuario se crea en el SQL directamente
    volumes:
      - oracle-data-1:/opt/oracle/oradata
      - ./docker/oracle/aerolinea.sql:/container-entrypoint-initdb.d/aerolinea.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - aerolinea-network

  # ============================================================
  # BASE DE DATOS - INSTANCIA 2
  # ============================================================
  oracle-db-2:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_db_2
    ports:
      - "1523:1521"
    environment:
      - ORACLE_PASSWORD=oracle
    volumes:
      - oracle-data-2:/opt/oracle/oradata
      - ./docker/oracle/aerolinea.sql:/container-entrypoint-initdb.d/aerolinea.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - aerolinea-network

  # ============================================================
  # APLICACIÓN - INSTANCIA 1 → conectada a oracle-db-1
  # ============================================================
  app1:
    build: .
    container_name: aerolinea_app1
    ports:
      - "8081:8080"
    depends_on:
      oracle-db-1:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:oracle:thin:@//oracle-db-1:1521/XEPDB1
      - DB_USER=USUARIO_AEROLINEA
      - DB_PASSWORD=LLego2005/
      - DB_DRIVER=oracle.jdbc.OracleDriver
    networks:
      - aerolinea-network

  # ============================================================
  # APLICACIÓN - INSTANCIA 2 → conectada a oracle-db-2
  # ============================================================
  app2:
    build: .
    container_name: aerolinea_app2
    ports:
      - "8082:8080"
    depends_on:
      oracle-db-2:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:oracle:thin:@//oracle-db-2:1521/XEPDB1
      - DB_USER=USUARIO_AEROLINEA
      - DB_PASSWORD=LLego2005/
      - DB_DRIVER=oracle.jdbc.OracleDriver
    networks:
      - aerolinea-network

volumes:
  oracle-data-1:
  oracle-data-2:

networks:
  aerolinea-network:
    driver: bridge