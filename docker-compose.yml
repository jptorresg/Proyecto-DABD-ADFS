services:

  # ============================================
  # SUCURSAL 1 - HOTEL PRINCIPAL
  # ============================================

  backend-sucursal1:
    build:
      context: ./HotelesAPI
      dockerfile: Dockerfile
    image: bedly/hoteles-api:latest
    container_name: bedly-backend-sucursal1
    restart: unless-stopped
    ports:
      - "5043:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=BedlyHoteles;User Id=sa;Password=BedlyHoteles2026!;TrustServerCertificate=True;Encrypt=False;"
      Jwt__Key: "BedlyHotelesSecretKey2026UnisSistemas"
      Jwt__Issuer: "HotelesAPI"
      Jwt__Audience: "BedlyFrontend"
      Jwt__ExpirationHours: "8"
      Email__Habilitado: "false"
      Email__SmtpServer: "smtp.gmail.com"
      Email__SmtpPort: "587"
      Email__Remitente: "tu-correo@gmail.com"
      Email__Password: "tu-app-password"
      Email__EmailAdmin: "tu-correo@gmail.com"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bedly-network

  frontend-sucursal1:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: bedly/hoteles-frontend:latest
    container_name: bedly-frontend-sucursal1
    restart: unless-stopped
    ports:
      - "5500:80"
    volumes:
      - ./Frontend/nginx-sucursal1/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-sucursal1
    networks:
      - bedly-network

  # ============================================
  # SUCURSAL 2 - HOTEL SECUNDARIO
  # ============================================

  backend-sucursal2:
    image: bedly/hoteles-api:latest
    container_name: bedly-backend-sucursal2
    restart: unless-stopped
    ports:
      - "5044:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=BedlyHoteles_Sucursal2;User Id=sa;Password=BedlyHoteles2026!;TrustServerCertificate=True;Encrypt=False;"
      Jwt__Key: "BedlyHotelesSecretKey2026UnisSistemas"
      Jwt__Issuer: "HotelesAPI"
      Jwt__Audience: "BedlyFrontend"
      Jwt__ExpirationHours: "8"
      Email__Habilitado: "false"
      Email__SmtpServer: "smtp.gmail.com"
      Email__SmtpPort: "587"
      Email__Remitente: "tu-correo@gmail.com"
      Email__Password: "tu-app-password"
      Email__EmailAdmin: "tu-correo@gmail.com"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend-sucursal1
    networks:
      - bedly-network

  frontend-sucursal2:
    image: bedly/hoteles-frontend:latest
    container_name: bedly-frontend-sucursal2
    restart: unless-stopped
    ports:
      - "5502:80"
    volumes:
      - ./Frontend/nginx-sucursal2/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-sucursal2
      - frontend-sucursal1
    networks:
      - bedly-network

# ============================================
# REDES
# ============================================
networks:
  bedly-network:
    driver: bridge
    name: bedly-network