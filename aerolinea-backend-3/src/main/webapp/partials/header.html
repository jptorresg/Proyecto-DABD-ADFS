<!-- Header Component - Alpine.js -->
<header class="header" x-data="headerData()">
    <div class="header-container">
        <!-- Logo y Nombre -->
        <div class="logo-section">
            <a href="./index.html" class="d-flex align-items-center text-decoration-none">
                <div class="logo-circle">
                    <i class="fas fa-plane-departure"></i>
                </div>
                <span class="brand-name">Aerolíneas Halcón</span>
            </a>
        </div>

        <!-- Barra de Búsqueda -->
        <div class="search-section" @click.away="showFilters = false">
            <div class="search-bar" @click="toggleFilters">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Buscar vuelos, destinos..."
                    x-model="searchQuery"
                    readonly
                >
                <button type="button" class="filter-btn" @click.stop="toggleFilters">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>

            <!-- DROPDOWN TIPO AIRBNB -->
            <div 
                x-show="showFilters"
                x-transition
                x-cloak
                class="search-dropdown"
            >
                <div class="dropdown-grid">

                    <div class="field">
                        <label>Origen</label>
                        <input type="text" placeholder="Ciudad origen" x-model="filters.origen">
                    </div>

                    <div class="field">
                        <label>Destino</label>
                        <input type="text" placeholder="Ciudad destino" x-model="filters.destino">
                    </div>

                    <!-- NUEVO: Toggle tipo de viaje -->
                    <div class="field field-full">
                        <label>Tipo de viaje</label>
                        <div class="trip-type-toggle">
                            <button class="trip-btn" 
                                    :class="filters.tipoViaje === 'ida' ? 'active' : ''"
                                    @click="filters.tipoViaje = 'ida'; filters.fechaRegreso = ''">
                                <i class="fas fa-arrow-right"></i> Solo ida
                            </button>
                            <button class="trip-btn"
                                    :class="filters.tipoViaje === 'idaVuelta' ? 'active' : ''"
                                    @click="filters.tipoViaje = 'idaVuelta'">
                                <i class="fas fa-exchange-alt"></i> Ida y vuelta
                            </button>
                        </div>
                    </div>

                    <div class="field">
                        <label>Fecha salida</label>
                        <input type="date" x-model="filters.fechaSalida">
                    </div>

                    <!-- Fecha regreso: solo activa si tipoViaje === 'idaVuelta' -->
                    <div class="field">
                        <label :style="filters.tipoViaje !== 'idaVuelta' ? 'opacity: 0.4' : ''">
                            Fecha regreso
                        </label>
                        <input type="date" 
                            x-model="filters.fechaRegreso"
                            :disabled="filters.tipoViaje !== 'idaVuelta'"
                            :style="filters.tipoViaje !== 'idaVuelta' ? 'opacity: 0.4; cursor: not-allowed' : ''">
                    </div>

                    <div class="field">
                        <label>Pasajeros</label>
                        <input type="number" min="1" value="1" x-model="filters.pasajeros">
                    </div>

                </div>

                <div class="dropdown-actions">
                    <button class="btn btn-primary" @click="applyFilters">
                        Buscar vuelos
                    </button>
                </div>
            </div>
        </div>

        <!-- Sección de Usuario - Visitante Anónimo -->
        <div class="user-section" x-show="!isLoggedIn">
            <a href="./login.html" class="btn btn-outline">
                Iniciar Sesión
            </a>
            <a href="./registro.html" class="btn btn-primary">
                Registrarse
            </a>
        </div>

        <!-- Sección de Usuario - Usuario Registrado -->
        <div class="user-section user-logged" x-show="isLoggedIn" x-cloak>
            <div class="user-profile" @click="toggleProfileMenu">
                <div class="profile-circle">
                    <i class="fas fa-user"></i>
                </div>
                <span class="username" x-text="userName"></span>
                <i class="fas fa-chevron-down dropdown-icon" :class="{ 'rotate-180': showProfileMenu }"></i>
            </div>
            
            <!-- Dropdown Menu (opcional para futuro) -->
            <div x-show="showProfileMenu" 
                 x-transition
                 @click.away="showProfileMenu = false"
                 class="profile-dropdown"
                 style="display: none;">
                <a href="./perfil/index.html" class="dropdown-item">Mi Perfil</a>
                <a href="./perfil/reservaciones.html" class="dropdown-item">Mis Reservaciones</a>
                <a href="#" class="dropdown-item">Configuración</a>
            </div>
            
            <button class="btn btn-outline" @click="logout">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </div>
</header>

<style>
/* Estilos adicionales para Alpine.js */
[x-cloak] { display: none !important; }

.rotate-180 {
    transform: rotate(180deg);
}

.profile-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 0.5rem;
    background: white;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    min-width: 200px;
    z-index: 1000;
}

.dropdown-item {
    display: block;
    padding: 0.75rem 1.25rem;
    color: var(--dark-gray);
    text-decoration: none;
    transition: background-color var(--transition-fast);
}

.dropdown-item:hover {
    background-color: var(--off-white);
    color: var(--primary-blue);
}

.dropdown-item:first-child {
    border-radius: 8px 8px 0 0;
}

.dropdown-item:last-child {
    border-radius: 0 0 8px 8px;
}
</style>
